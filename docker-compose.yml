services:

  app:

    container_name: onemall-app

    image: ${CI_REGISTRY_IMAGE}:latest

    env_file:

      - ${ENV_FILE_PATH:-.env}

    ports:

      - "${APP_PORT:-8010}:9000"

    volumes:

      - ./storage:/var/www/html/storage

    environment:

      APP_ENV: "${APP_ENV:-production}"

      DB_CONNECTION: mysql

      DB_HOST: mysql

      DB_PORT: 3306

    depends_on:

      mysql:

        condition: service_healthy



  phpmyadmin:

    container_name: onemall-phpmyadmin

    image: phpmyadmin:5-apache

    ports:

      - "${PHPMYADMIN_PORT:-8090}:80"

    environment:

      PMA_HOST: mysql

      PMA_PORT: 3306

    depends_on:

      mysql:

        condition: service_healthy



  mysql:

    container_name: onemall-mysql

    image: mysql:8.0

    ports:

      - "${MYSQL_PUBLISH_PORT:-3308}:3306"

    env_file:

      - ${ENV_FILE_PATH:-.env}

    volumes:

      - onemall_mysql_data:/var/lib/mysql

    healthcheck:

      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} || exit 1"]

      interval: 5s

      timeout: 5s

      retries: 10

      start_period: 30s



volumes:

  onemall_mysql_data:
